<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แผนที่จุดความร้อน VIIRS พื้นที่ สคพ.11 (ฉบับสมบูรณ์)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f3f4f6; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #4a148c; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #64748b; font-size: 14px; margin-bottom: 20px; }
        .control-panel { background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 15px; }
        .status-box { font-size: 15px; color: #4a148c; margin-bottom: 15px; background: #e9d5ff; padding: 10px; border-radius: 6px; border: 1px solid #d8b4fe; }
        
        #alertBanner { 
            display: none; 
            background-color: #fee2e2; 
            color: #b91c1c; 
            padding: 12px 15px; 
            border-radius: 8px; 
            border: 1px solid #f87171; 
            margin-bottom: 15px; 
            font-size: 15px; 
            text-align: center; 
            box-shadow: 0 2px 4px rgba(220, 38, 38, 0.1);
        }

        .mode-selector { margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px dashed #cbd5e1; display: flex; flex-wrap: wrap; gap: 15px; }
        .mode-selector label { font-size: 15px; cursor: pointer; display: inline-flex; align-items: center; }
        .mode-selector input { margin-right: 8px; accent-color: #4a148c; transform: scale(1.2); }
        #sliderContainer { transition: opacity 0.3s ease; }
        
        #map-wrapper { position: relative; }
        #loadingOverlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255, 255, 255, 0.85);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
        }
        .spinner {
            border: 5px solid #e2e8f0;
            border-top: 5px solid #4a148c;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #map { height: 600px; width: 100%; border-radius: 8px; z-index: 10; }
        .legend-box { background: white; padding: 10px 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); font-size: 14px; line-height: 1.6; max-height: 500px; overflow-y: auto; width: 280px; }
        .legend-title { font-weight: bold; margin-bottom: 5px; border-bottom: 1px solid #ccc; padding-bottom: 5px; margin-top: 10px; }
        .legend-title:first-child { margin-top: 0; }
        .dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-right: 5px; }
        input[type=range] { width: 100%; margin-top: 10px; accent-color: #4a148c; }
        details summary::-webkit-details-marker { display:none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>ระบบเฝ้าระวังจุดความร้อน VIIRS (สคพ.11)</h2>
        <div class="subtitle">ครอบคลุมพื้นที่ นครราชสีมา ชัยภูมิ บุรีรัมย์ สุรินทร์</div>
        
        <div id="alertBanner"></div>
        
        <div class="control-panel">
            <div class="status-box">
                🛰️ <b>ข้อมูลดาวเทียมในระบบล่าสุด:</b> <span id="lastUpdateDisplay" style="color: #b91c1c; font-weight: bold;">กำลังตรวจสอบ...</span>
            </div>

            <div class="mode-selector">
                <label>
                    <input type="radio" name="viewMode" value="slider" checked>
                    <b>ระบุช่วงเวลา (ชั่วโมงย้อนหลัง)</b>
                </label>
                <label>
                    <input type="radio" name="viewMode" value="24hours">
                    <b>แสดงรอบ 24 ชม.</b>
                </label>
                <label>
                    <input type="radio" name="viewMode" value="72hours">
                    <b>แสดงภาพรวม 3 วัน</b>
                </label>
                <label>
                    <input type="radio" name="viewMode" value="30days">
                    <b>แสดงภาพรวม 30 วัน</b>
                </label>
            </div>

            <div id="sliderContainer">
                <label for="hourSlider" style="font-size: 16px;">
                    <b>แสดงจุดความร้อนย้อนหลัง: </b> 
                    <span id="hourValueDisplay" style="color: #d84315; font-weight: bold; font-size: 1.2em;">24</span> 
                    <b> ชั่วโมง</b> <span style="font-size: 14px; color: #64748b;">(นับย้อนจากข้อมูลดาวเทียมล่าสุด)</span>
                </label>
                <input type="range" id="hourSlider" min="1" max="720" value="24" step="1">
                <div style="display: flex; justify-content: space-between; font-size: 12px; color: #64748b; margin-top: 5px;">
                    <span>1 ชม.</span>
                    <span>15 วัน (360 ชม.)</span>
                    <span>30 วัน (720 ชม.)</span>
                </div>
            </div>
        </div>

        <div id="map-wrapper">
            <div id="loadingOverlay">
                <div class="spinner"></div>
                <div style="margin-top: 15px; font-weight: bold; color: #4a148c; font-size: 16px;">กำลังดาวน์โหลดข้อมูลจาก สทอภ. ...</div>
            </div>
            <div id="map"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    <script>
        const apikey = 'CU5IxlOrmXHghx67MB6tI9SZ5L9xEJFeypIuPPXt9tfjtHcmxdsAQXK9CjpyqlLG';
        const bbox = '101.1,14.1,104.0,16.5';
        const apiUrl = 'https://api-gateway.gistda.or.th/api/2.0/resources/features/viirs/30days?api_key=' + apikey + '&limit=10000&bbox=' + bbox;

        const geojsonBoundariesUrl = 'https://raw.githubusercontent.com/apisit/thailand.json/master/thailand.json';

        const map = L.map('map').setView([15.2, 102.5], 8);

        const osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 18,
            attribution: '© OpenStreetMap'
        });

        const satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            maxZoom: 18,
            attribution: '© Esri'
        });

        osmLayer.addTo(map);

        const baseMaps = {
            "แผนที่ถนน (OSM)": osmLayer,
            "ภาพถ่ายดาวเทียม (Esri)": satelliteLayer
        };
        L.control.layers(baseMaps).addTo(map);

        const targetKeywords = ["นครราชสีมา", "ชัยภูมิ", "บุรีรัมย์", "สุรินทร์", "Nakhon Ratchasima", "Chaiyaphum", "Buri Ram", "Buriram", "Surin"];
        const targetProvincesThai = ["นครราชสีมา", "ชัยภูมิ", "บุรีรัมย์", "สุรินทร์"];
        
        let allReo11Features = [];
        let latestDateObj = new Date(0);
        let hotspotLayer;
        let summaryControl;
        let currentMode = 'slider';

        function parseAcqDateTime(feature) {
            let props = feature.properties || {};
            let dateStr = props.acq_date || props.ACQ_DATE || props.acq_datetime || props.ADATE || "";
            let timeStr = props.acq_time || props.ACQ_TIME || props.ATIME || "0000";
            
            if (!dateStr) return new Date(0);
            
            let year = 0, month = 0, day = 0;
            let dStr = String(dateStr);
            if (dStr.includes('-')) {
                let parts = dStr.split('-');
                if (parts[0].length === 4) { year = parseInt(parts[0], 10); month = parseInt(parts[1], 10) - 1; day = parseInt(parts[2], 10); }
                else { year = parseInt(parts[2], 10); month = parseInt(parts[1], 10) - 1; day = parseInt(parts[0], 10); }
            } else if (dStr.includes('/')) {
                let parts = dStr.split('/');
                if (parts[2].length === 4) { year = parseInt(parts[2], 10); month = parseInt(parts[1], 10) - 1; day = parseInt(parts[0], 10); }
                else { year = parseInt(parts[0], 10); month = parseInt(parts[1], 10) - 1; day = parseInt(parts[2], 10); }
            } else {
                return new Date(0);
            }
            
            let tStr = String(timeStr).replace(/:/g, '').padStart(4, '0');
            let hours = parseInt(tStr.substring(0, 2), 10) || 0;
            let mins = parseInt(tStr.substring(2, 4), 10) || 0;
            
            return new Date(Date.UTC(year, month, day, hours, mins));
        }

        function formatTimeStr(dateObj) {
            let h = String(dateObj.getHours()).padStart(2, '0');
            let m = String(dateObj.getMinutes()).padStart(2, '0');
            return h + ":" + m + " น.";
        }
        
        function formatDateStr(dateObj) {
            let d = String(dateObj.getDate()).padStart(2, '0');
            let m = String(dateObj.getMonth() + 1).padStart(2, '0');
            let y = dateObj.getFullYear() + 543;
            return d + "/" + m + "/" + y;
        }

        fetch(geojsonBoundariesUrl)
            .then(res => res.json())
            .then(data => {
                const filteredBoundaries = {
                    type: "FeatureCollection",
                    features: data.features.filter(f => {
                        const propStr = JSON.stringify(f.properties);
                        return targetKeywords.some(keyword => propStr.includes(keyword));
                    })
                };

                const boundaryLayer = L.geoJSON(filteredBoundaries, {
                    style: {
                        color: "#4a148c", 
                        weight: 5,         
                        opacity: 1,        
                        fillOpacity: 0.05,
                        dashArray: ''
                    }
                }).addTo(map);

                if (filteredBoundaries.features.length > 0) {
                    map.fitBounds(boundaryLayer.getBounds());
                }
            })
            .catch(err => console.error('ไม่สามารถโหลดข้อมูลขอบเขตจังหวัดได้', err));

        fetch(apiUrl)
            .then(response => {
                if (!response.ok) throw new Error('Network response was not ok');
                return response.json();
            })
            .then(data => {
                let oldestDateObj = null;

                data.features.forEach(feature => {
                    let dt = parseAcqDateTime(feature);
                    if (dt.getTime() > 0) {
                        if (latestDateObj.getTime() === 0 || dt > latestDateObj) {
                            latestDateObj = dt;
                        }
                        if (!oldestDateObj || dt < oldestDateObj) {
                            oldestDateObj = dt;
                        }
                    }
                });

                allReo11Features = data.features.filter(feature => {
                    const propStr = JSON.stringify(feature.properties || {});
                    return targetProvincesThai.some(p => propStr.includes(p));
                });

                if (latestDateObj.getTime() > 0 && oldestDateObj) {
                    let dateRangeStr = formatDateStr(oldestDateObj) + " ถึง " + formatDateStr(latestDateObj);
                    document.getElementById('lastUpdateDisplay').innerText = "ช่วงข้อมูล สคพ.11 ที่ดึงได้: " + dateRangeStr;
                    
                    let now = new Date();
                    let hoursDiff = (now.getTime() - latestDateObj.getTime()) / (1000 * 60 * 60);
                    let alertBanner = document.getElementById('alertBanner');
                    
                    if (hoursDiff > 24) {
                        let delayHours = Math.floor(hoursDiff);
                        alertBanner.innerHTML = "⚠️ <b>แจ้งเตือน:</b> ข้อมูลดาวเทียมล่าสุดล่าช้ากว่าเวลาปัจจุบัน <b>" + delayHours + " ชั่วโมง</b> (อาจเกิดจากระบบต้นทาง สทอภ. อยู่ระหว่างปรับปรุงข้อมูล)";
                        alertBanner.style.display = "block";
                    } else {
                        alertBanner.style.display = "none";
                    }

                } else {
                    document.getElementById('lastUpdateDisplay').innerText = "ไม่พบข้อมูลในระบบ สทอภ.";
                }

                updateMap();
                document.getElementById('loadingOverlay').style.display = 'none';
            })
            .catch(error => {
                console.error('เกิดข้อผิดพลาดในการดึงข้อมูล', error);
                document.getElementById('lastUpdateDisplay').innerText = "เกิดข้อผิดพลาดในการเชื่อมต่อข้อมูล";
                document.getElementById('loadingOverlay').style.display = 'none';
            });

        function getTopLanduseHtml(provName, pLuCounts) {
            let luObj = pLuCounts[provName];
            let keys = Object.keys(luObj);
            if (keys.length === 0) return "<div style='margin-bottom: 8px;'></div>";
            let topLu = keys.reduce((a, b) => luObj[a] > luObj[b] ? a : b);
            return `<div style="padding-left: 10px; font-size: 13px; color: #b91c1c; margin-bottom: 8px; margin-top: 2px;">↳ พบใน<b>${topLu}</b>มากที่สุด (${luObj[topLu]} จุด)</div>`;
        }

        function getAmphoeStatsHtml(provName, pAmpCounts) {
            let ampObj = pAmpCounts[provName];
            let keys = Object.keys(ampObj);
            if (keys.length === 0) return "";

            keys.sort((a, b) => ampObj[b] - ampObj[a]);

            let top5 = keys.slice(0, 5);
            let bottom5 = [];
            
            if (keys.length > 5) {
                bottom5 = keys.slice(-5).reverse();
            }

            let html = '<details style="margin-top: 5px; margin-bottom: 10px; cursor: pointer; background: #f8fafc; padding: 6px; border-radius: 6px; border: 1px solid #e2e8f0;">';
            html += '<summary style="font-size: 13px; color: #0284c7; font-weight: bold; outline: none; display: flex; align-items: center;">📊 เรียงลำดับจุดความร้อนรายอำเภอ</summary>';
            html += '<div style="padding-left: 5px; font-size: 12px; margin-top: 8px;">';

            html += '<div style="color: #b91c1c; font-weight: bold;">🔥 5 ลำดับสูงสุด</div>';
            top5.forEach((k, idx) => {
                html += '<div style="margin-left: 10px; color: #333;">' + (idx + 1) + '. อ.' + k + ' (' + ampObj[k] + ' จุด)</div>';
            });

            if (bottom5.length > 0) {
                html += '<div style="color: #15803d; font-weight: bold; margin-top: 8px;">📉 5 ลำดับต่ำสุด (ที่พบจุดความร้อน)</div>';
                bottom5.forEach((k, idx) => {
                    html += '<div style="margin-left: 10px; color: #333;">' + (idx + 1) + '. อ.' + k + ' (' + ampObj[k] + ' จุด)</div>';
                });
            } else {
                 html += '<div style="color: #64748b; margin-top: 5px; font-style: italic;">* พบจุดความร้อนในพื้นที่ไม่เกิน 5 อำเภอ</div>';
            }

            html += '</div></details>';
            return html;
        }

        function updateMap() {
            if (hotspotLayer) { map.removeLayer(hotspotLayer); }
            if (summaryControl) { map.removeControl(summaryControl); }

            let hotspotCounts = { "นครราชสีมา": 0, "ชัยภูมิ": 0, "บุรีรัมย์": 0, "สุรินทร์": 0 };
            let landuseCounts = {};
            let provLuCounts = { "นครราชสีมา": {}, "ชัยภูมิ": {}, "บุรีรัมย์": {}, "สุรินทร์": {} };
            let provAmphoeCounts = { "นครราชสีมา": {}, "ชัยภูมิ": {}, "บุรีรัมย์": {}, "สุรินทร์": {} };
            
            let featuresToDisplay = [];
            let timeRangeDisplay = "";
            let hours = parseInt(document.getElementById('hourSlider').value);

            if (latestDateObj.getTime() > 0) {
                let cutoffTime;
                
                if (currentMode === 'slider') {
                    const hoursInMs = hours * 60 * 60 * 1000;
                    cutoffTime = new Date(latestDateObj.getTime() - hoursInMs);
                    timeRangeDisplay = formatTimeStr(cutoffTime) + " ถึง " + formatTimeStr(latestDateObj);
                } else if (currentMode === '24hours') {
                    const hoursInMs = 24 * 60 * 60 * 1000;
                    cutoffTime = new Date(latestDateObj.getTime() - hoursInMs);
                    timeRangeDisplay = "24 ชั่วโมงย้อนหลัง";
                } else if (currentMode === '72hours') {
                    const hoursInMs = 72 * 60 * 60 * 1000;
                    cutoffTime = new Date(latestDateObj.getTime() - hoursInMs);
                    timeRangeDisplay = "3 วันย้อนหลัง (72 ชั่วโมง)";
                } else if (currentMode === '30days') {
                    const hoursInMs = 30 * 24 * 60 * 60 * 1000;
                    cutoffTime = new Date(latestDateObj.getTime() - hoursInMs);
                    timeRangeDisplay = "30 วันย้อนหลัง";
                }

                featuresToDisplay = allReo11Features.filter(feature => {
                    let dt = parseAcqDateTime(feature);
                    if (dt >= cutoffTime && dt <= latestDateObj) {
                        countFeature(feature, hotspotCounts, landuseCounts, provLuCounts, provAmphoeCounts);
                        return true;
                    }
                    return false;
                });
            }

            const filteredData = {
                type: "FeatureCollection",
                features: featuresToDisplay
            };

            hotspotLayer = L.markerClusterGroup({
                maxClusterRadius: 40,
                spiderfyOnMaxZoom: true,
                showCoverageOnHover: false,
                zoomToBoundsOnClick: true
            });

            const geoJsonLayer = L.geoJSON(filteredData, {
                pointToLayer: function (feature, latlng) {
                    let props = feature.properties || {};
                    let conf = props.confidence || props.CONFIDENCE || "";
                    let confStr = String(conf).trim().toLowerCase();
                    let markerColor = "#ffc107"; 
                    
                    if (confStr === 'h' || confStr === 'high' || Number(conf) >= 80) {
                        markerColor = "#dc3545"; 
                    } else if (confStr === 'n' || confStr === 'nominal' || (Number(conf) >= 50 && Number(conf) < 80)) {
                        markerColor = "#fd7e14"; 
                    }

                    return L.circleMarker(latlng, {
                        radius: 6,
                        fillColor: markerColor,
                        color: "#fff",
                        weight: 1,
                        opacity: 1,
                        fillOpacity: 0.9
                    });
                },
                onEachFeature: function (feature, layer) {
                    let props = feature.properties || {};
                    let dt = parseAcqDateTime(feature);
                    let timeDisplay = dt.getTime() > 0 ? formatTimeStr(dt) : "-";
                    let dateDisplay = dt.getTime() > 0 ? formatDateStr(dt) : "-";
                    
                    let lat = props.latitude || (feature.geometry && feature.geometry.coordinates[1]) || "-";
                    let lon = props.longitude || (feature.geometry && feature.geometry.coordinates[0]) || "-";
                    
                    let propStr = JSON.stringify(props);
                    let prov = targetProvincesThai.find(p => propStr.includes(p)) || "-";
                    let amp = props.amphoe_t || props.ap_tn || props.amphoe || "-";
                    let tam = props.tambon_t || props.tb_tn || props.tambon || "-";
                    let landuse = props.landuse_t || props.lu_name || props.landuse || props.lu_type || "ไม่ระบุข้อมูล";
                    let conf = props.confidence || props.CONFIDENCE || "-";
                    
                    let popupContent = "<div style='font-size: 14px;'>";
                    popupContent += "<div style='background-color:#4a148c; color:white; padding:5px; border-radius:4px; margin-bottom:8px; text-align:center;'><b>รายละเอียดจุดความร้อน</b></div>";
                    popupContent += "<b>พิกัด:</b> " + lat + "  " + lon + "<br>";
                    popupContent += "<b>ประเภทพื้นที่:</b> <span style='color:#d84315; font-weight:bold;'>" + landuse + "</span><br>";
                    popupContent += "<b>ตำบล:</b> " + tam + "<br>";
                    popupContent += "<b>อำเภอ:</b> " + amp + "<br>";
                    popupContent += "<b>จังหวัด:</b> " + prov + "<br>";
                    popupContent += "<b>วันที่:</b> " + dateDisplay + "<br>";
                    popupContent += "<b>เวลา:</b> " + timeDisplay + "<br>";
                    popupContent += "<b>ความเชื่อมั่น:</b> " + conf;
                    popupContent += "</div>";
                    
                    layer.bindPopup(popupContent);
                }
            });

            hotspotLayer.addLayer(geoJsonLayer);
            map.addLayer(hotspotLayer);

            summaryControl = L.control({position: 'bottomright'});
            summaryControl.onAdd = function (map) {
                const div = L.DomUtil.create('div', 'legend-box');
                
                L.DomEvent.disableClickPropagation(div);
                L.DomEvent.disableScrollPropagation(div);
                
                let total = hotspotCounts["นครราชสีมา"] + hotspotCounts["ชัยภูมิ"] + hotspotCounts["บุรีรัมย์"] + hotspotCounts["สุรินทร์"];
                
                let modeText = '';
                if (currentMode === 'slider') modeText = '(ย้อนหลัง ' + hours + ' ชม.)';
                else if (currentMode === '24hours') modeText = '(รวม 24 ชม.)';
                else if (currentMode === '72hours') modeText = '(รวม 3 วัน)';
                else if (currentMode === '30days') modeText = '(รวม 30 วัน)';

                let html = '<div class="legend-title">สรุปข้อมูล สคพ.11 ' + modeText + '</div>';
                
                if (latestDateObj.getTime() === 0 || total === 0) {
                    html += '<div style="color:#d84315; font-weight:bold; margin-bottom:10px;">ไม่พบข้อมูลจุดความร้อนในช่วงเวลานี้</div>';
                } else {
                    if (currentMode === 'slider') {
                        html += 'ช่วงเวลา: <b>' + timeRangeDisplay + '</b><br>';
                    }
                    html += 'รวมพบ: <b>' + total + '</b> จุด<br><br>';
                    
                    html += '<b>นครราชสีมา:</b> ' + hotspotCounts["นครราชสีมา"] + ' จุด<br>';
                    html += getTopLanduseHtml("นครราชสีมา", provLuCounts);
                    html += getAmphoeStatsHtml("นครราชสีมา", provAmphoeCounts);
                    
                    html += '<b>ชัยภูมิ:</b> ' + hotspotCounts["ชัยภูมิ"] + ' จุด<br>';
                    html += getTopLanduseHtml("ชัยภูมิ", provLuCounts);
                    html += getAmphoeStatsHtml("ชัยภูมิ", provAmphoeCounts);
                    
                    html += '<b>บุรีรัมย์:</b> ' + hotspotCounts["บุรีรัมย์"] + ' จุด<br>';
                    html += getTopLanduseHtml("บุรีรัมย์", provLuCounts);
                    html += getAmphoeStatsHtml("บุรีรัมย์", provAmphoeCounts);
                    
                    html += '<b>สุรินทร์:</b> ' + hotspotCounts["สุรินทร์"] + ' จุด<br>';
                    html += getTopLanduseHtml("สุรินทร์", provLuCounts);
                    html += getAmphoeStatsHtml("สุรินทร์", provAmphoeCounts);
                }

                html += '<div class="legend-title">รวมแยกตามประเภทพื้นที่</div>';
                let luKeys = Object.keys(landuseCounts).sort((a, b) => landuseCounts[b] - landuseCounts[a]);
                if (luKeys.length === 0) {
                    html += '<div style="color:#64748b;">ไม่มีข้อมูล</div>';
                } else {
                    // เพิ่ม Container สำหรับกราฟโดนัท
                    html += '<div style="height: 180px; margin-top: 10px; margin-bottom: 15px;"><canvas id="landuseChart"></canvas></div>';
                    // แสดงตัวเลขรายละเอียดประกอบกราฟ
                    luKeys.forEach(key => {
                        let dotColor = '#ccc';
                        html += `<div style="display:flex; justify-content:space-between; font-size:13px; margin-bottom:3px;">
                                    <span>${key}</span> 
                                    <b>${landuseCounts[key]} จุด</b>
                                 </div>`;
                    });
                }
                
                html += '<div class="legend-title">ระดับความเชื่อมั่น</div>';
                html += '<div><span class="dot" style="background:#dc3545;"></span> สูง (High)</div>';
                html += '<div><span class="dot" style="background:#fd7e14;"></span> ปานกลาง (Nominal)</div>';
                html += '<div><span class="dot" style="background:#ffc107;"></span> ต่ำ (Low)</div>';
                
                div.innerHTML = html;
                return div;
            };
            summaryControl.addTo(map);

            // คำสั่งสร้างและอัปเดตกราฟโดนัทหลังจากที่ Element ถูกสร้างลงในหน้าเว็บแล้ว
            setTimeout(() => {
                let chartCanvas = document.getElementById('landuseChart');
                if (chartCanvas) {
                    if (window.luChartInstance) {
                        window.luChartInstance.destroy();
                    }
                    let luKeys = Object.keys(landuseCounts).sort((a, b) => landuseCounts[b] - landuseCounts[a]);
                    let dataValues = luKeys.map(k => landuseCounts[k]);
                    
                    // กำหนดชุดสีสำหรับประเภทพื้นที่ต่างๆ
                    let colors = ['#ef4444', '#f97316', '#f59e0b', '#84cc16', '#06b6d4', '#3b82f6', '#8b5cf6', '#d946ef', '#f43f5e'];
                    
                    window.luChartInstance = new Chart(chartCanvas, {
                        type: 'doughnut',
                        data: {
                            labels: luKeys,
                            datasets: [{
                                data: dataValues,
                                backgroundColor: colors.slice(0, luKeys.length),
                                borderWidth: 1,
                                borderColor: '#ffffff'
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: {
                                    display: false // ซ่อน Label ของกราฟเพื่อประหยัดพื้นที่เนื่องจากเรามีตัวหนังสือแจ้งด้านล่างแล้ว
                                },
                                tooltip: {
                                    callbacks: {
                                        label: function(context) {
                                            return ' ' + context.label + ': ' + context.raw + ' จุด';
                                        }
                                    }
                                }
                            },
                            cutout: '60%'
                        }
                    });
                }
            }, 100);
        }

        function countFeature(feature, counts, luCounts, pLuCounts, pAmpCounts) {
            let props = feature.properties || {};
            let propStr = JSON.stringify(props);
            let matchedProv = targetProvincesThai.find(p => propStr.includes(p));
            if (matchedProv) {
                counts[matchedProv]++;
                let landuse = props.landuse_t || props.lu_name || props.landuse || props.lu_type || "ไม่ระบุข้อมูล";
                
                if (!luCounts[landuse]) {
                    luCounts[landuse] = 0;
                }
                luCounts[landuse]++;
                
                if (!pLuCounts[matchedProv][landuse]) {
                    pLuCounts[matchedProv][landuse] = 0;
                }
                pLuCounts[matchedProv][landuse]++;

                let amp = props.amphoe_t || props.ap_tn || props.amphoe || "ไม่ระบุ";
                amp = String(amp).replace(/^อ\./, '').trim(); 
                if (!pAmpCounts[matchedProv][amp]) {
                    pAmpCounts[matchedProv][amp] = 0;
                }
                pAmpCounts[matchedProv][amp]++;
            }
        }

        document.getElementById('hourSlider').addEventListener('input', function(e) {
            document.getElementById('hourValueDisplay').innerText = e.target.value;
            if (currentMode === 'slider') {
                updateMap();
            }
        });

        const radios = document.querySelectorAll('input[name="viewMode"]');
        radios.forEach(radio => {
            radio.addEventListener('change', function(e) {
                currentMode = e.target.value;
                const sliderDiv = document.getElementById('sliderContainer');
                if (currentMode !== 'slider') {
                    sliderDiv.style.opacity = '0.3';
                    sliderDiv.style.pointerEvents = 'none';
                } else {
                    sliderDiv.style.opacity = '1';
                    sliderDiv.style.pointerEvents = 'auto';
                }
                updateMap();
            });
        });

    </script>
</body>
</html>
