            setTimeout(() => {
                toast.style.animation = 'fadeOut 0.3s forwards';

                    toast.remove();
                }, 300);
            }, 3000);

// Use cutMap.html to cut the four provinces' boundary from https://raw.githubusercontent.com/cvibhagool/thailand-map/master/thailand-provinces.geojson
    	 const geojsonBoundariesUrl = 'https://raw.githubusercontent.com/Kietpawpan/hotspot/refs/heads/main/REO11_boundary.geojson';

        const osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
           maxZoom: 18,
           attribution: '© OpenStreetMap'
        });

        const satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
           maxZoom: 18,
           attribution: '© Esri'
        });
//เพิ่มแผนที่จราจร
	const googleTrafficLayer = L.tileLayer('https://mt1.google.com/vt?lyrs=h,traffic&x={x}&y={y}&z={z}', {
   	 maxZoom: 20,
   	 attribution: '© Google Maps'
	});

        osmLayer.addTo(map);

        const baseMaps = {
            "แผนที่ถนน (OSM)": osmLayer,
            "ภาพถ่ายดาวเทียม (Esri)": satelliteLayer
        };


// 1. สร้าง Layer สำหรับสถานีตรวจอากาศ
const aqmLayer = L.layerGroup();

// 2. สร้าง Layer สำหรับสถานที่กำจัดขยะ
const landfillLayer = L.layerGroup();

// 3. สร้าง Layer สำหรับจุดความร้อน (เพิ่มใหม่และตั้งค่าคลัสเตอร์)
const hotspotLayer = L.markerClusterGroup({
    maxClusterRadius: 40,
    spiderfyOnMaxZoom: true,
    showCoverageOnHover: false,
    zoomToBoundsOnClick: true
}).addTo(map);

// 4. นำ Layer ทั้งหมดมารวมไว้ในเมนู overlayMaps
const overlayMaps = {
    "จุดความร้อน (NASA)": hotspotLayer,
    "สถานีตรวจวัดคุณภาพอากาศ": aqmLayer,
    "สถานที่กำจัดขยะ": landfillLayer
};

// 5. นำเมนูไปแสดงบนแผนที่
L.control.layers(baseMaps, overlayMaps).addTo(map);

        const targetKeywords = ["นครราชสีมา", "ชัยภูมิ", "บุรีรัมย์", "สุรินทร์", "Nakhon Ratchasima", "Chaiyaphum", "Buri Ram", "Buriram", "Surin"];
        const targetProvincesThai = ["นครราชสีมา", "ชัยภูมิ", "บุรีรัมย์", "สุรินทร์"];
        
        let boundaryGeoJSON = null;
        let summaryControl;
        let globalFeatures = [];
        let currentTimeframe = 24;
        let currentTimeOfDay = 'all';

        fetch(geojsonBoundariesUrl)
            .then(res => res.json())
            .then(data => {
                boundaryGeoJSON = {
                    type: "FeatureCollection",
                    features: data.features.filter(f => {
                        const propStr = JSON.stringify(f.properties);
                        return targetKeywords.some(keyword => propStr.includes(keyword));
                    })
                };

                const boundaryLayer = L.geoJSON(boundaryGeoJSON, {
                    style: {
                        color: "#4a148c", 
                        weight: 5,         
                        opacity: 1,        
                        fillOpacity: 0.05,
                        dashArray: ''
                    }
                }).addTo(map);

                if (boundaryGeoJSON.features.length > 0) {
                    map.fitBounds(boundaryLayer.getBounds());
                }

                fetchNasaData();
            })
            .catch(err => console.error('ไม่สามารถโหลดข้อมูลขอบเขตจังหวัดได้', err));


// ตัวแปรเก็บสถานะว่า Layer ไหนเปิดอยู่บ้าง (ค่าเริ่มต้นให้เปิดจุดความร้อน)

let currentHotspotTotal = 0;
let currentHotspotCounts = {"นครราชสีมา": 0, "ชัยภูมิ": 0, "บุรีรัมย์": 0, "สุรินทร์": 0};

// ฟังก์ชันอัปเดตเนื้อหาใน Legend
function updateDynamicLegend() {
    const legendDiv = document.getElementById('dynamic-legend');
    if (!legendDiv) return;

    if (activeLayers.size === 0) {

    // สร้างส่วนอธิบายจุดความร้อน

        html += '<div class="legend-title">🔥 สรุปจุดความร้อน (' + currentTimeframe + ' ชม.)</div>';
        if (currentHotspotTotal === 0) {
            html += '<div style="color:#d84315; font-weight:bold; margin-bottom:10px;">ไม่พบจุดความร้อนในพื้นที่</div>';
        } else {
            html += 'รวมพบ: <b>' + currentHotspotTotal + '</b> จุด<br>';
            html += '<div style="margin-left: 10px; font-size: 13px;">';
            html += 'นครราชสีมา: ' + currentHotspotCounts["นครราชสีมา"] + ' จุด<br>';
            html += 'ชัยภูมิ: ' + currentHotspotCounts["ชัยภูมิ"] + ' จุด<br>';
            html += 'บุรีรัมย์: ' + currentHotspotCounts["บุรีรัมย์"] + ' จุด<br>';
            html += 'สุรินทร์: ' + currentHotspotCounts["สุรินทร์"] + ' จุด<br>';
            html += '</div>';
        }
        html += '<div style="margin-top:5px;"><b>ระดับความเชื่อมั่น:</b></div>';
        html += '<div><span class="dot" style="background:#dc3545;"></span> สูง (High)</div>';
        html += '<div><span class="dot" style="background:#fd7e14;"></span> ปานกลาง (Nominal)</div>';
        html += '<div><span class="dot" style="background:#ffc107;"></span> ต่ำ (Low)</div>';
    }

    // สร้างส่วนอธิบายคุณภาพอากาศ
    if (activeLayers.has("สถานีตรวจวัดคุณภาพอากาศ")) {
        html += '<div class="legend-title">💨 คุณภาพอากาศ PM2.5</div>';
        html += '<div><span class="dot" style="background:#38bdf8;"></span> 0-15 (ดีมาก) 😊</div>';
        html += '<div><span class="dot" style="background:#4ade80;"></span> 15.1-25 (ดี) 🙂</div>';
        html += '<div><span class="dot" style="background:#facc15;"></span> 25.1-37.5 (ปานกลาง) 😐</div>';
        html += '<div><span class="dot" style="background:#fb923c;"></span> 37.6-75 (เริ่มมีผลกระทบ) ⚠️</div>';
        html += '<div><span class="dot" style="background:#f87171;"></span> >75 (มีผลกระทบ) 🚨</div>';
    }

    // สร้างส่วนอธิบายสถานที่กำจัดขยะ
    if (activeLayers.has("สถานที่กำจัดขยะ")) {
        html += '<div class="legend-title">🗑️ สถานที่กำจัดขยะ (ขนาดพื้นที่)</div>';

        function fetchNasaData() {
            fetch(gasWebappUrl)
                .then(res => res.text())
                .then(csvText => {
                    let allFeatures = [];
                    let apiError = null;

                    const lines = csvText.trim().split('\n');
                    
                    if (lines.length > 0 && !lines[0].includes('latitude')) {
                        apiError = lines[0];
                    }

                    if (!apiError && lines.length >= 2) {
                        const headers = lines[0].split(',');
                        for(let i = 1; i < lines.length; i++) {
                            const values = lines[i].split(',');
                            if(values.length < headers.length) continue;
                            
                            let props = {};
                            headers.forEach((h, idx) => { props[h] = values[idx]; });
                            
                            const lat = parseFloat(props.latitude);
                            const lon = parseFloat(props.longitude);
                            
                            const dateParts = props.acq_date.split('-');
                            const timeStr = String(props.acq_time).padStart(4, '0');
                            const hours = parseInt(timeStr.substring(0, 2), 10);
                            const mins = parseInt(timeStr.substring(2, 4), 10);
                            const acqDateTime = new Date(Date.UTC(parseInt(dateParts[0], 10), parseInt(dateParts[1], 10) - 1, parseInt(dateParts[2], 10), hours, mins));
                            props.parsed_datetime = acqDateTime;

                            let pt = turf.point([lon, lat]);
                            let provName = null;
                            
                            for(let f of boundaryGeoJSON.features) {
                                if(turf.booleanPointInPolygon(pt, f)) {
                                    const propStr = JSON.stringify(f.properties);
                                    if(propStr.includes("นครราชสีมา") || propStr.includes("Nakhon Ratchasima")) provName = "นครราชสีมา";
                                    else if(propStr.includes("ชัยภูมิ") || propStr.includes("Chaiyaphum")) provName = "ชัยภูมิ";
                                    else if(propStr.includes("บุรีรัมย์") || propStr.includes("Buri Ram") || propStr.includes("Buriram")) provName = "บุรีรัมย์";
                                    else if(propStr.includes("สุรินทร์") || propStr.includes("Surin")) provName = "สุรินทร์";
                                    break;
                                }
                            }

                            if(provName) {
                                props.prov_name = provName;
                                allFeatures.push({
                                    type: "Feature",
                                    geometry: { type: "Point", coordinates: [lon, lat] },
                                    properties: props
                                });
                            }
                        }
                    }

                    if (apiError && allFeatures.length === 0) {
                        document.getElementById('lastUpdateDisplay').innerText = "⚠️ แจ้งเตือนจากระบบส่วนกลาง: " + apiError;
                        document.getElementById('loadingOverlay').style.display = 'none';
                        return;
                    }

                    globalFeatures = allFeatures;
                    document.getElementById('loadingOverlay').style.display = 'none';
                    applyTimeFilter();
                    showToast("อัปเดตข้อมูลจุดความร้อนล่าสุดเรียบร้อยแล้ว", "success");

                })
                .catch(error => {
                    console.error('เกิดข้อผิดพลาด', error);
                    document.getElementById('lastUpdateDisplay').innerText = "เกิดข้อผิดพลาดในการเชื่อมต่อข้อมูลส่วนกลาง";
                    document.getElementById('loadingOverlay').style.display = 'none';
                });
        }

        function applyTimeFilter() {
            let filteredFeatures = [];
            let hotspotCounts = {};
            hotspotCounts["นครราชสีมา"] = 0;
            hotspotCounts["ชัยภูมิ"] = 0;
            hotspotCounts["บุรีรัมย์"] = 0;
            hotspotCounts["สุรินทร์"] = 0;
            let totalSpots = 0;

            let now = new Date();
            if (globalFeatures.length > 0) {
                let maxTime = Math.max(...globalFeatures.map(f => f.properties.parsed_datetime.getTime()));
                now = new Date(maxTime);
            }

            let cutoffTime = new Date(now.getTime() - (currentTimeframe * 60 * 60 * 1000));

            globalFeatures.forEach(feature => {
                if (feature.properties.parsed_datetime >= cutoffTime) {
                    let dt = feature.properties.parsed_datetime;
                    
                    let localHour = (dt.getUTCHours() + 7) % 24;
                    let isMorning = localHour >= 0 && localHour < 12;
                    let isAfternoon = localHour >= 12 && localHour < 24;

                    let matchTimeOfDay = true;
                    if (currentTimeOfDay === 'morning' && !isMorning) matchTimeOfDay = false;
                    if (currentTimeOfDay === 'afternoon' && !isAfternoon) matchTimeOfDay = false;

                    if (matchTimeOfDay) {
                        filteredFeatures.push(feature);
                        hotspotCounts[feature.properties.prov_name]++;
                        totalSpots++;
                    }
                }
            });

            if (totalSpots === 0 && globalFeatures.length === 0) {
                document.getElementById('lastUpdateDisplay').innerText = "ไม่พบจุดความร้อนในรอบ " + currentTimeframe + " ชม. ล่าสุด";
            } else {
                let displayTxt = "แสดงข้อมูลรอบ " + currentTimeframe + " ชม. ล่าสุด";
                if (currentTimeframe === 12) {
                    if (currentTimeOfDay === 'morning') displayTxt += " (เฉพาะรอบเช้า)";
                    else if (currentTimeOfDay === 'afternoon') displayTxt += " (เฉพาะรอบบ่าย)";
                }
                document.getElementById('lastUpdateDisplay').innerText = displayTxt + " สำเร็จ (เฉพาะ Suomi-NPP)";
            }

            renderMap(filteredFeatures, hotspotCounts, totalSpots);
        }

        document.querySelectorAll('.time-radio').forEach(radio => {
            radio.addEventListener('change', function() {
                if(this.checked) {
                    const parts = this.value.split('-');
                    currentTimeframe = parseInt(parts[0]);
                    currentTimeOfDay = parts[1];
                    applyTimeFilter();
                }
            });
        });


function renderMap(features, counts, total) {
    // เคลียร์หมุดเดิม
    hotspotLayer.clearLayers();
    
    const filteredData = {
        type: "FeatureCollection",
        features: features
    };
    
    const geoJsonLayer = L.geoJSON(filteredData, {
        pointToLayer: function (feature, latlng) {
            let props = feature.properties || {};
            let conf = props.confidence || "";
            let confStr = String(conf).trim().toLowerCase();
            let markerColor = "#ffc107"; 
            
            if (confStr === 'h' || confStr === 'high') {
                markerColor = "#dc3545"; 
            } else if (confStr === 'n' || confStr === 'nominal') {
                markerColor = "#fd7e14"; 
            }

            return L.circleMarker(latlng, {
                radius: 6,
                fillColor: markerColor,
                color: "#fff",
                weight: 1,
                opacity: 1,
                fillOpacity: 0.9
            });
        },
        onEachFeature: function (feature, layer) {
            let props = feature.properties || {};
            let dt = props.parsed_datetime;
            let dateDisplay = "-";
            let timeDisplay = "-";
            
            const thaiMonths = ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."];
            
            if (dt) {
                let thDate = new Date(dt.getTime() + (7 * 60 * 60 * 1000));
                
                let thDay = thDate.getUTCDate();
                let thMonthName = thaiMonths[thDate.getUTCMonth()];
                let thYear = thDate.getUTCFullYear() + 543;
                dateDisplay = thDay + " " + thMonthName + " " + thYear;
                
                let thHours = String(thDate.getUTCHours()).padStart(2, '0');
                let thMins = String(thDate.getUTCMinutes()).padStart(2, '0');
                timeDisplay = thHours + ":" + thMins + " น.";
            }
            
            let lat = props.latitude || "-";
            let lon = props.longitude || "-";
            let prov = props.prov_name || "-";
            
            let conf = props.confidence || "-";
            let confStr = String(conf).trim().toLowerCase();
            let confDisplay = conf;
            if (confStr === 'h' || confStr === 'high') confDisplay = "สูง (High)";
            else if (confStr === 'n' || confStr === 'nominal') confDisplay = "ปานกลาง (Nominal)";
            else if (confStr === 'l' || confStr === 'low') confDisplay = "ต่ำ (Low)";
            
            let satellite = props.satellite || "-";
            let satDisplay = satellite;
            if (satellite === 'N') satDisplay = "Suomi-NPP";
            else if (satellite === '1') satDisplay = "NOAA-20";

	    let googleMapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}`;

            let popupContent = "<div style='font-size: 14px;'>";
            popupContent += "<div style='background-color:#4a148c; color:white; padding:5px; border-radius:4px; margin-bottom:8px; text-align:center;'><b>รายละเอียดจุดความร้อน (NASA)</b></div>";
            popupContent += "<b>พิกัด:</b> " + lat + "  " + lon + "<br>";
            popupContent += "<b>ตำบล:</b> <span class='tb-name' style='color:#0284c7; font-weight:bold;'>กำลังค้นหา...</span><br>";
            popupContent += "<b>อำเภอ:</b> <span class='ap-name' style='color:#0284c7; font-weight:bold;'>กำลังค้นหา...</span><br>";
            popupContent += "<b>จังหวัด:</b> <span class='pv-name' style='color:#0284c7; font-weight:bold;'>" + prov + "</span><br>";
            popupContent += "<b>วันที่:</b> " + dateDisplay + "<br>";
            popupContent += "<b>เวลา:</b> " + timeDisplay + " (เวลาประเทศไทย)<br>";
            popupContent += "<b>ดาวเทียม:</b> " + satDisplay + "<br>";
            popupContent += "<b>ความเชื่อมั่น:</b> " + confDisplay + "<br><br>";
            popupContent += "<a href='" + googleMapsUrl + "' target='_blank' style='display:block; text-align:center; background-color:#16a34a; color:white; padding:8px 0; border-radius:6px; text-decoration:none; font-weight:bold;'>📍 เปิดนำทางด้วย Google Maps</a>";
            popupContent += "</div>";
            
            layer.bindPopup(popupContent);

            layer.on('popupopen', function(e) {
                let popupNode = e.popup._contentNode;
                if (!popupNode) return;
                
                let tambonEl = popupNode.querySelector('.tb-name');
                let amphoeEl = popupNode.querySelector('.ap-name');
                let provinceEl = popupNode.querySelector('.pv-name'); 
                let cacheKey = lat + "_" + lon;
                
                if (tambonEl && tambonEl.innerText === 'กำลังค้นหา...') {
                    if (addressCache[cacheKey]) {
                        tambonEl.innerText = addressCache[cacheKey].tambon;
                        amphoeEl.innerText = addressCache[cacheKey].amphoe;
                        provinceEl.innerText = addressCache[cacheKey].province; 
                    } else {
                        fetch(`https://api.longdo.com/map/services/address?lon=${lon}&lat=${lat}&key=${longdoApiKey}`)
                        .then(res => res.json())
                        .then(data => {
                            if(data) {
                                let t = data.subdistrict || "-";
                                let a = data.district || "-";
                                let p = data.province || "-"; 
                                
                                t = t.replace(/^ตำบล/g, '').replace(/^แขวง/g, '').trim();
                                a = a.replace(/^อำเภอ/g, '').replace(/^เขต/g, '').trim();
                                p = p.replace(/^จังหวัด/g, '').trim(); 
                                
                                let finalTambon = t !== "-" ? t : "ไม่ระบุ";
                                let finalAmphoe = a !== "-" ? a : "ไม่ระบุ";
                                let finalProvince = p !== "-" ? p : prov; 
                                
                                tambonEl.innerText = finalTambon;
                                amphoeEl.innerText = finalAmphoe;
                                provinceEl.innerText = finalProvince;
                                
                                addressCache[cacheKey] = { tambon: finalTambon, amphoe: finalAmphoe, province: finalProvince };
                            } else {
                                tambonEl.innerText = "ไม่พบข้อมูล";
                                amphoeEl.innerText = "ไม่พบข้อมูล";
                                provinceEl.innerText = prov;
                            }
                        }).catch(() => {
                            tambonEl.innerText = "ข้อผิดพลาด";
                            amphoeEl.innerText = "ข้อผิดพลาด";
                            provinceEl.innerText = prov;
                        });
                    }
                }
            });
        }
    }); 

    hotspotLayer.addLayer(geoJsonLayer);
    
    // อัปเดตสถิติลงตัวแปรส่วนกลาง แล้วสั่งรีเฟรช Legend
    currentHotspotTotal = total;
    currentHotspotCounts = counts;
    updateDynamicLegend();
}

// ดึงข้อมูลสถานีตรวจอากาศที่คัดกรองแล้วจาก Google Apps Script
function fetchAQMData() {
    const url = 'https://script.google.com/macros/s/AKfycby-YFuRlXJlQSfqMafbUuhjHaPiRYKM1bN0v7Bz0al3rHu5i4biaqaxhM9j71aa1Jtv/exec';
    
    fetch(url)
        .then(res => res.json())
        .then(data => {
            if (data.error) throw new Error(data.error);

            data.forEach(station => {
                const lat = parseFloat(station.lat);
                const lon = parseFloat(station.lon);
                const pm25Value = station.pm25;
                
                // แปลงค่า PM2.5 เป็นตัวเลขเพื่อจัดกลุ่มสีและ Emoji
                let pmNum = parseFloat(pm25Value);
                let textColor = "#94a3b8"; // สีเทาสำหรับกรณีไม่มีข้อมูล
                let emoji = "❓";

                if (!isNaN(pmNum)) {
                    if (pmNum <= 15.0) {
                        textColor = "#38bdf8"; // สีฟ้า
                        emoji = "😊" + " ดีมาก";
                    } else if (pmNum <= 25.0) {
                        textColor = "#4ade80"; // สีเขียว
                        emoji = "🙂" + " ดี";
                    } else if (pmNum <= 37.5) {
                        textColor = "#facc15"; // สีเหลือง
                        emoji = "😐" + " ปานกลาง";
                    } else if (pmNum <= 75.0) {
                        textColor = "#fb923c"; // สีส้ม
                        emoji = "⚠️" + " เริ่มมีผลกระทบต่อสุขภาพ";
                    } else {
                        textColor = "#f87171"; // สีแดง
                        emoji = "🚨"+ " มีผลกระทบต่อสุขภาพ";
                    }
                }

                // จัดรูปแบบวันที่และเวลา
                let thaiDateTimeDisplay = station.date + " " + station.time;
                try {
                    let dateParts = station.date.split('-');
                    if (dateParts.length === 3) {
                        let d = parseInt(dateParts[2], 10);
                        let mIndex = parseInt(dateParts[1], 10) - 1;
                        let y = parseInt(dateParts[0], 10);

                        // แปลงเป็น พ.ศ. หากยังเป็น ค.ศ.
                        if (y < 2500) y += 543; 

                        const fullThaiMonths = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
                        
                        if (mIndex >= 0 && mIndex <= 11) {
                            let timeParts = station.time.split(':');
                            let timeFormatted = station.time;
                            if (timeParts.length >= 2) {
                                timeFormatted = timeParts[0] + ":" + timeParts[1];
                            }
                            thaiDateTimeDisplay = `${d} ${fullThaiMonths[mIndex]} ${y} ${timeFormatted} น.`;
                        }
                    }
                } catch(e) {
                    console.error("เกิดข้อผิดพลาดในการแปลงวันที่", e);
                }

                // สร้างไอคอนสามเหลี่ยม
                const triangleSvg = `<svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <polygon points="12,2 22,20 2,20" fill="#9333ea" stroke="#ffffff" stroke-width="2"/>
                </svg>`;

                const customIcon = L.divIcon({
                    html: triangleSvg,
                    className: '', 
                    iconSize: [24, 24],
                    iconAnchor: [12, 12], 
                    popupAnchor: [0, -12] 
                });

                const marker = L.marker([lat, lon], { icon: customIcon });

                // เตรียม HTML สำหรับ Popup พร้อมใส่ Emoji
                let popupHTML = "<div style='font-size: 14px;'>";


                popupHTML += "<div style='background-color:#9333ea; color:white; padding:5px; border-radius:4px; margin-bottom:8px; text-align:center;'><b>สถานีวัดคุณภาพอากาศ (Air4Thai)</b></div>";
                popupHTML += "<b>พิกัด:</b> " + lat.toFixed(5) + "  " + lon.toFixed(5) + "<br>";
                popupHTML += "<b>ตำบล:</b> <span class='aqm-tb-name' style='color:#0284c7; font-weight:bold;'>กำลังค้นหา...</span><br>";
                popupHTML += "<b>อำเภอ:</b> <span class='aqm-ap-name' style='color:#0284c7; font-weight:bold;'>กำลังค้นหา...</span><br>";
                popupHTML += "<b>จังหวัด:</b> " + station.prov_name + "<br>";
                popupHTML += "<b>สถานี:</b> " + station.nameTH + "<br>";
                popupHTML += "<b>เวลา:</b> " + thaiDateTimeDisplay + "<br>";
                popupHTML += "<b>ค่า PM2.5:</b> <span style='font-weight:bold; font-size: 16px; color:" + textColor + "; text-shadow: 0px 0px 1px rgba(0,0,0,0.2);'>" + pm25Value + " µg/m³ " + emoji + "</span><br>";
                
		let googleMapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}`;

                popupHTML += "<br><a href='" + googleMapsUrl + "' target='_blank' style='display:block; text-align:center; background-color:#16a34a; color:white; padding:8px 0; border-radius:6px; text-decoration:none; font-weight:bold;'>📍 เปิดนำทางด้วย Google Maps</a>";
                
                popupHTML += "</div>";

// ปิดเอง:
marker.bindPopup(popupHTML);

// ค้าง:
// marker.bindPopup(popupHTML, { autoClose: false, closeOnClick: false });

                marker.on('popupopen', function(e) {
                    let popupNode = e.popup._contentNode;
                    if (!popupNode) return;
                    
                    let tambonEl = popupNode.querySelector('.aqm-tb-name');
                    let amphoeEl = popupNode.querySelector('.aqm-ap-name');
                    let cacheKey = lat + "_" + lon;
                    
                    if (tambonEl && tambonEl.innerText === 'กำลังค้นหา...') {
                        if (addressCache[cacheKey]) {
                            tambonEl.innerText = addressCache[cacheKey].tambon;
                            amphoeEl.innerText = addressCache[cacheKey].amphoe;
                        } else {
                            fetch(`https://api.longdo.com/map/services/address?lon=${lon}&lat=${lat}&key=${longdoApiKey}`)
                            .then(res => res.json())
                            .then(data => {
                                if(data) {
                                    let t = data.subdistrict || "-";
                                    let a = data.district || "-";
                                    
                                    t = t.replace(/^ตำบล/g, '').replace(/^แขวง/g, '').trim();
                                    a = a.replace(/^อำเภอ/g, '').replace(/^เขต/g, '').trim();
                                    
                                    let finalTambon = t !== "-" ? t : "ไม่ระบุ";
                                    let finalAmphoe = a !== "-" ? a : "ไม่ระบุ";
                                    
                                    tambonEl.innerText = finalTambon;
                                    amphoeEl.innerText = finalAmphoe;
                                    
                                    addressCache[cacheKey] = { 
                                        tambon: finalTambon, 
                                        amphoe: finalAmphoe, 
                                        province: station.prov_name 
                                    };
                                } else {
                                    tambonEl.innerText = "ไม่พบข้อมูล";
                                    amphoeEl.innerText = "ไม่พบข้อมูล";
                                }
                            }).catch(() => {
                                tambonEl.innerText = "ข้อผิดพลาด";
                                amphoeEl.innerText = "ข้อผิดพลาด";
                            });
                        }
                    }
                });

                aqmLayer.addLayer(marker);
            });
        })
        .catch(err => {
            console.error("ข้อผิดพลาดในการดึงข้อมูล Air4Thai ผ่าน GAS", err);
            showToast("ไม่สามารถเชื่อมต่อข้อมูลสถานีคุณภาพอากาศได้", "error");
        });
}

//เรียกดูสถานที่กำจัดขยะจาก APS WasteSiteEPO11 https://script.google.com/macros/s/AKfycbwWI0NvtyToeNBq5Y0Yu6VCKiJh27JDSDBZTJ0IbQ1mGsErkJfFdzYdkiVAw72GGWKZ/exec


function getLandfillColor(area, status) {
    // ตรวจสอบว่ามีค่าสถานะและสถานะนั้น "ไม่ใช่" คำว่า "เปิดดำเนินงาน"
    // ใช้ .trim() เพื่อตัดช่องว่างซ้ายขวาเผื่อมีการพิมพ์เว้นวรรคติดมาในฐานข้อมูล
    if (status && status.trim() !== "เปิดดำเนินงาน") {
        return "#1f2937"; // สีดำ (เทาเข้ม)
    }

    let areaNum = parseFloat(area);
    if (isNaN(areaNum)) return "#a1a1aa"; // สีเทา หากไม่มีข้อมูล
    if (areaNum <= 15) {
        return "#38bdf8"; // สีฟ้า
    } else if (areaNum <= 25.0) {
        return "#4ade80"; // สีเขียว
    } else if (areaNum <= 37.5) {
        return "#facc15"; // สีเหลือง
    } else if (areaNum <= 75.0) {
        return "#fb923c"; // สีส้ม
    } else {
        return "#f87171"; // สีแดง
    }
}

let landfillMarkers = [];

function fetchLandfillData() {
    // นำ URL ที่ได้จาก Google Apps Script มาใส่ตรงนี้ครับ
    const gasUrl = 'https://script.google.com/macros/s/AKfycbwWI0NvtyToeNBq5Y0Yu6VCKiJh27JDSDBZTJ0IbQ1mGsErkJfFdzYdkiVAw72GGWKZ/exec';

    fetch(gasUrl)
        .then(res => res.json())
        .then(data => {
            const targetProvinces = ["นครราชสีมา", "ชัยภูมิ", "บุรีรัมย์", "สุรินทร์"];

            data.forEach(row => {
                let prov = row["จังหวัด"] || "";
                let isTarget = targetProvinces.some(p => prov.includes(p));

                if (isTarget) {
                    let lat = parseFloat(row["ละติจูด"]);
                    let lon = parseFloat(row["ลองจิจูด"]);
                    
                    // ปรับชื่อตัวแปรให้ตรงกับหัวคอลัมน์ใน Google Sheets ใหม่
                    let siteName = row["ชื่อสถานที่"] || "ไม่ระบุชื่อ";
                    let agency = row["ชื่อผู้ดำเนินการ"] || "-";
                    let address = row["ที่ตั้ง"] || "-";
                    let type = row["รูปแบบการกำจัด"] || "-";
                    let area = row["เนื้อที่ (ไร่)"] || "-";
                    let wasteAmount = row["ปริมาณขยะ (ตัน/วัน)"] || "-";
        	       let siteStatus = row["สถานะการดำเนินงานในปัจจุบัน"] || "-";
                      let yearStart = row["ปีที่เปิดดำเนินงาน"] || "-";


// 1. ดึงสีพื้นฐานมาก่อน
                    let trashColor = getLandfillColor(area, siteStatus);

                    // 2. คำนวณความเสี่ยงก่อนสร้างไอคอน
                    let wasteNum = parseFloat(wasteAmount);
                    let areaNum = parseFloat(area);
                    let isAtRisk = false;
                    let riskReason = "";

                    if (siteStatus.includes("เต็ม") || siteStatus.includes("วิกฤต")) {
                        isAtRisk = true;
                        riskReason = "สถานะแจ้งว่าพื้นที่เต็ม";
                    } else if (!isNaN(wasteNum) && !isNaN(areaNum) && areaNum > 0) {
                        let density = wasteNum / areaNum;
                        if (density > 1) { // เกณฑ์เตือนภัย: ขยะมากกว่า 2 ตัน ต่อ 1 ไร่ ต่อวัน
                            isAtRisk = true;
                            riskReason = `ปริมาณขยะมาก (${density.toFixed(2)} ตัน/ไร่/วัน)`;
                        }
                    }
/*===========================================================================
1. ความหนาแน่นของขยะเทกอง (Loose Density) ขยะที่เทลงจากรถบรรทุกโดยไม่มีการบดอัด จะมีความหนาแน่นเพียง 0.15 ถึง 0.30 ตัน/ลูกบาศก์เมตร เท่านั้น (เทียบกับแบบบดอัดที่สูงถึง 0.6 - 0.8 ตัน/ลบ.ม.)

2. ขีดความสามารถในการรองรับ (Capacity) ที่ความสูง 3 เมตรหากใช้เกณฑ์ "ป้องกันไว้ก่อน" ที่ความสูง 3 เมตร ตามที่ท่านตั้งไว้:ปริมาตร: $1,600 ตร.ม. * 3 เมตร = 4,800 ลูกบาศก์เมตร/ไร่
น้ำหนักขยะที่รองรับได้: จะรับขยะได้เพียง 720 ถึง 1,440 ตัน/ไร่ เท่านั้น

3. ปริมาณที่รับได้ต่อวัน (Inflow Rate) หากถามว่ารับได้ "กี่ตัน/ไร่/วัน" จนกว่าจะเต็มเกณฑ์ 3 เมตร ภายในระยะเวลาต่างๆ:
ระยะเวลาที่ต้องการให้ใช้งานได้ปริมาณขยะขาเข้าที่รับได้ (ตัน/ไร่/วัน) สถานะ

ให้ใช้ได้นาน 1 ปี (365 วัน) 	2 - 4 ตัน/ไร่/วัน 	เสี่ยงสูง (เต็มเร็วมาก)
ให้ใช้ได้นาน 6 เดือน (180 วัน)	4 - 8 ตัน/ไร่/วัน	วิกฤต
ให้ใช้ได้นาน 3 เดือน (90 วัน)	8 - 16 ตัน/ไร่/วัน	เต็มพิกัดทันที


=============================================================================*/
                    // ปรับสีและความหนาของเส้นหากมีความเสี่ยง
                    let bufferWeight = 1.5;
                    if (isAtRisk) {
                        trashColor = "#7f1d1d"; // สีแดงเข้ม (Dark Red)
                        bufferWeight = 3; 
                    }

                    // 3. เริ่มวาดลงแผนที่โดยใช้สีที่อัปเดตแล้ว
                    if (!isNaN(lat) && !isNaN(lon)) {
                        const trashSvg = `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M5 6V20C5 21.1046 5.89543 22 7 22H17C18.1046 22 19 21.1046 19 20V6H5Z" fill="${trashColor}"/>
                            <path d="M9 4V2H15V4H20V6H4V4H9Z" fill="#5D4037"/>
                        </svg>`;

                        const trashIcon = L.divIcon({
                            html: trashSvg,
                            className: '',
                            iconSize: [24, 24],
                            iconAnchor: [12, 12],
                            popupAnchor: [0, -12]
                        });

                        let marker = L.marker([lat, lon], { icon: trashIcon });

                        // สร้างวงรัศมี 5 กิโลเมตร (5000 เมตร) เพียงครั้งเดียว
                        let bufferRadius = 5000;
                        let bufferCircle = L.circle([lat, lon], {
                            color: trashColor,     
                            fillColor: trashColor, 
                            fillOpacity: 0.1,      
                            weight: bufferWeight, 
                            dashArray: '5, 5'      
                        });
                        
                        bufferCircle.addTo(landfillLayer);

                        // 4. สร้างหน้าต่าง Popup
                        let popupHTML = "<div style='font-size: 14px;'>";
                        popupHTML += "<div style='background-color:#5D4037; color:white; padding:5px; border-radius:4px; margin-bottom:8px; text-align:center;'><b>สถานที่กำจัดขยะมูลฝอย (ปี 2568)</b></div>";
                        
                        // แทรกคำเตือนในป๊อปอัปหากมีความเสี่ยง
                        if (isAtRisk) {
                            popupHTML += `<div style='background-color:#fef2f2; color:#b91c1c; padding:8px; border-left:4px solid #b91c1c; margin-bottom:10px; font-weight:bold;'>⚠️ เฝ้าระวัง: ${riskReason}</div>`;
                        }

                        popupHTML += "<b>สถานที่:</b> " + siteName + "<br>";
                        popupHTML += "<b>หน่วยงานดูแล:</b> " + agency + "<br>";
                        popupHTML += "<b>ที่ตั้ง:</b> " + address + "<br>";
                        popupHTML += "<b>รูปแบบการกำจัด:</b> " + type + "<br>";
                        popupHTML += "<b>เนื้อที่:</b> <span style='font-weight:bold; color:"+trashColor+";'>" + area + "</span> ไร่<br>";
                        popupHTML += "<b>ปีเปิด:</b> " + yearStart + "<br>";
                        popupHTML += "<b>สถานะ:</b> " + siteStatus + "<br>";
                        popupHTML += "<b>ปริมาณขยะ:</b> " + wasteAmount + " ตัน/วัน<br>";

			let mapNavUrl = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}`;

                        popupHTML += "<br><a href='" + mapNavUrl + "' target='_blank' style='display:block; text-align:center; background-color:#16a34a; color:white; padding:8px 0; border-radius:6px; text-decoration:none; font-weight:bold;'>📍 เปิดนำทางด้วย Google Maps</a>";
                        popupHTML += "</div>";

                        marker.bindPopup(popupHTML);
                        landfillLayer.addLayer(marker);

                        // ทำระบบค้นหา
     			landfillMarkers.push({
    				marker: marker,
   				 address: address,
    				name: siteName
			});
                    }
                }
            });
        })
        .catch(err => {
            console.error("เกิดข้อผิดพลาดในการโหลดข้อมูลสถานที่กำจัดขยะ", err);
        });
}

// เรียกใช้งานฟังก์ชัน
fetchLandfillData();

document.getElementById('siteSearchBtn').addEventListener('click', doSiteSearch);
document.getElementById('siteSearchInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') doSiteSearch();
});

function doSiteSearch() {
    const keyword = document.getElementById('siteSearchInput').value.trim().toLowerCase();
    if (!keyword) {
        showToast("กรุณาระบุชื่อตำบลหรือคำค้นหา", "warning");
        return;
    }

    let found = false;
    for (let item of landfillMarkers) {
        // ค้นหาจากที่ตั้ง (ตำบล/อำเภอ) หรือชื่อสถานที่
        if (item.address.toLowerCase().includes(keyword) || item.name.toLowerCase().includes(keyword)) {
            
            // เช็กว่าเลเยอร์ขยะเปิดอยู่หรือไม่ ถ้าปิดอยู่ให้เปิดก่อน
            if (!map.hasLayer(landfillLayer)) {
                map.addLayer(landfillLayer);
            }

            // ซูมแผนที่ไปที่หมุดและเปิดป๊อปอัป
            map.setView(item.marker.getLatLng(), 14);
            item.marker.openPopup();
            
            showToast("พบสถานที่กำจัดขยะ: " + item.name, "success");
            found = true;
            break; // หยุดค้นหาเมื่อเจอเป้าหมายแรก
        }
    }

    if (!found) {
        showToast("ไม่พบสถานที่กำจัดขยะที่ตรงกับคำค้นหา", "error");
    }
}
