function fetchNasaData(reo11Bbox) {
    fetch(gasWebappUrl)
        .then(res => res.text())
        .then(csvText => {
            let allFeatures = [];
            let apiError = null;

            const lines = csvText.trim().split('\n');
          
            if (lines.length > 0 && !lines[0].includes('latitude')) {
                apiError = lines[0];
            }

            if (!apiError && lines.length >= 2) {
                const headers = lines[0].split(',');
                let i = 1;
                const chunkSize = 50; 

                function processChunk() {
                    let end = Math.min(i + chunkSize, lines.length);
                    
                    for (; i < end; i++) {
                        const values = lines[i].split(',');
                        if(values.length < headers.length) continue;
                        
                        let props = {};
                        headers.forEach((h, idx) => { props[h] = values[idx]; });
                        
                        const lat = parseFloat(props.latitude);
                        const lon = parseFloat(props.longitude);
                        
                        if (lon >= reo11Bbox[0] && lat >= reo11Bbox[1] && lon <= reo11Bbox[2] && lat <= reo11Bbox[3]) {
                            let pt = turf.point([lon, lat]);
                            let provName = null;

                            for(let f of boundaryGeoJSON.features) {
                                if (lon >= f.bbox[0] && lat >= f.bbox[1] && lon <= f.bbox[2] && lat <= f.bbox[3]) {
                                    if(turf.booleanPointInPolygon(pt, f)) {
                                        const propStr = JSON.stringify(f.properties);
                                        if(propStr.includes("นครราชสีมา") || propStr.includes("Nakhon Ratchasima")) provName = "นครราชสีมา";
                                        else if(propStr.includes("ชัยภูมิ") || propStr.includes("Chaiyaphum")) provName = "ชัยภูมิ";
                                        else if(propStr.includes("บุรีรัมย์") || propStr.includes("Buri Ram") || propStr.includes("Buriram")) provName = "บุรีรัมย์";
                                        else if(propStr.includes("สุรินทร์") || propStr.includes("Surin")) provName = "สุรินทร์";
                                        break;
                                    }
                                }
                            }

                            if(provName) {
                                const dateParts = props.acq_date.split('-');
                                const timeStr = String(props.acq_time).padStart(4, '0');
                                const hours = parseInt(timeStr.substring(0, 2), 10);
                                const mins = parseInt(timeStr.substring(2, 4), 10);
                                props.parsed_datetime = new Date(Date.UTC(parseInt(dateParts[0], 10), parseInt(dateParts[1], 10) - 1, parseInt(dateParts[2], 10), hours, mins));

                                props.prov_name = provName;
                                props.is_neighbor = false;
                                globalCoreFeatures.push({
                                    type: "Feature",
                                    geometry: { type: "Point", coordinates: [lon, lat] },
                                    properties: props
                                });
                            } else {
                                rawNeighborCandidates.push({ props: props, lon: lon, lat: lat });
                            }
                        } else {
                            rawNeighborCandidates.push({ props: props, lon: lon, lat: lat });
                        }
                    }

                    if (i < lines.length) {
                        let percent = Math.round((i / lines.length) * 100);
                        
                        // อัปเดตข้อความเปอร์เซ็นต์กลางจอโหลดสีดำ
                        let overlayStatus = document.getElementById('loadingStatusText');
                        if (overlayStatus) overlayStatus.innerText = `ANALYZING NASA FIRMS DATA... ${percent}%`;

                        // อัปเดตข้อความเปอร์เซ็นต์ที่แถบสถานะด้านบน
                        let statusEl = document.getElementById('lastUpdateDisplay');
                        if (statusEl) statusEl.innerHTML = `<span style="color:#0284c7;">กำลังคัดกรองจุดความร้อนในพื้นที่... ${percent}%</span>`;
                        
                        setTimeout(processChunk, 15);
                    } else {
                        // เมื่อประมวลผล 4 จังหวัดเสร็จ ให้ซ่อนหน้าจอโหลดสีดำ
                        let loadingOverlay = document.getElementById('loadingOverlay');
                        if (loadingOverlay) loadingOverlay.style.display = 'none';

                        applyTimeFilter();
                        showToast("โหลดข้อมูลจุดความร้อนพื้นที่หลักสำเร็จ", "success");
                    }
                }

                processChunk();
            }
        })
        .catch(error => {
            console.error('เกิดข้อผิดพลาด', error);
            document.getElementById('lastUpdateDisplay').innerText = "เกิดข้อผิดพลาดในการเชื่อมต่อข้อมูลส่วนกลาง";
            
            // ป้องกันจอโหลดค้างกรณีเกิด Error
            let loadingOverlay = document.getElementById('loadingOverlay');
            if (loadingOverlay) loadingOverlay.style.display = 'none';
        });
}

function processNeighborsAsync() {
    showToast("กำลังคำนวณจุดความร้อนพื้นที่ข้างเคียง...", "info");
    let i = 0;
    const chunkSize = 150;

    function processChunk() {
        let end = Math.min(i + chunkSize, rawNeighborCandidates.length);
        for (; i < end; i++) {
            let item = rawNeighborCandidates[i];
            let pt = turf.point([item.lon, item.lat]);
            let provName = null;
            
            for(let f of neighborGeoJSON.features) {
                if (item.lon >= f.bbox[0] && item.lat >= f.bbox[1] && item.lon <= f.bbox[2] && item.lat <= f.bbox[3]) {
                    if(turf.booleanPointInPolygon(pt, f)) {
                        provName = f.properties.pro_th || f.properties.NAME_1 || "จังหวัดข้างเคียง";
                        break;
                    }
                }
            }
            
            if (provName) {
                const dateParts = item.props.acq_date.split('-');
                const timeStr = String(item.props.acq_time).padStart(4, '0');
                const hours = parseInt(timeStr.substring(0, 2), 10);
                const mins = parseInt(timeStr.substring(2, 4), 10);
                item.props.parsed_datetime = new Date(Date.UTC(parseInt(dateParts[0], 10), parseInt(dateParts[1], 10) - 1, parseInt(dateParts[2], 10), hours, mins));

                item.props.prov_name = provName;
                item.props.is_neighbor = true;
                globalNeighborFeatures.push({
                    type: "Feature",
                    geometry: pt.geometry,
                    properties: item.props
                });
            }
        }

        if (i < rawNeighborCandidates.length) {
            let percent = Math.round((i / rawNeighborCandidates.length) * 100);
            let statusEl = document.getElementById('lastUpdateDisplay');
            if (statusEl) statusEl.innerHTML = `<span style="color:#d97706;">วิเคราะห์พื้นที่ข้างเคียง... ${percent}%</span>`;
            setTimeout(processChunk, 15);
        } else {
            isNeighborProcessed = true;
            applyTimeFilter();
            showToast("อัปเดตจุดความร้อนพื้นที่ข้างเคียงเรียบร้อยแล้ว", "success");
        }
    }
    processChunk();
}

function applyTimeFilter() {
    let filteredFeatures = [];
    let hotspotCounts = {"นครราชสีมา": 0, "ชัยภูมิ": 0, "บุรีรัมย์": 0, "สุรินทร์": 0};
    let totalSpots = 0;
    let neighborTotal = 0; 

    let allFeaturesToFilter = globalCoreFeatures;
    if (activeLayers.has("จุดความร้อน (จังหวัดข้างเคียง)") && isNeighborProcessed) {
        allFeaturesToFilter = globalCoreFeatures.concat(globalNeighborFeatures);
    }

    let now = new Date();
    if (allFeaturesToFilter.length > 0) {
        let maxTime = 0;
        allFeaturesToFilter.forEach(f => {
            let t = f.properties.parsed_datetime.getTime();
            if (t > maxTime) maxTime = t;
        });
        now = new Date(maxTime);
    }

    let cutoffTime = new Date(now.getTime() - (currentTimeframe * 60 * 60 * 1000));

    allFeaturesToFilter.forEach(feature => {
        if (feature.properties.parsed_datetime >= cutoffTime) {
            let dt = feature.properties.parsed_datetime;
            
            let localHour = (dt.getUTCHours() + 7) % 24;
            let isMorning = localHour >= 0 && localHour < 12;
            let isAfternoon = localHour >= 12 && localHour < 24;

            let matchTimeOfDay = true;
            if (currentTimeOfDay === 'morning' && !isMorning) matchTimeOfDay = false;
            if (currentTimeOfDay === 'afternoon' && !isAfternoon) matchTimeOfDay = false;

            if (matchTimeOfDay) {
                filteredFeatures.push(feature);
                if (feature.properties.is_neighbor) {
                    neighborTotal++;
                } else {
                    hotspotCounts[feature.properties.prov_name]++;
                    totalSpots++;
                }
            }
        }
    });

    if (totalSpots === 0 && allFeaturesToFilter.length === 0) {
        document.getElementById('lastUpdateDisplay').innerText = "ไม่พบจุดความร้อนในรอบ " + currentTimeframe + " ชม. ล่าสุด";
    } else {
        let displayTxt = "แสดงจุดความร้อนรอบ " + currentTimeframe + " ชม. ล่าสุด";
        if (currentTimeframe === 12) {
            if (currentTimeOfDay === 'morning') displayTxt += " (เฉพาะรอบเช้า)";
            else if (currentTimeOfDay === 'afternoon') displayTxt += " (เฉพาะรอบบ่าย)";
        }
        document.getElementById('lastUpdateDisplay').innerText = displayTxt + " สำเร็จ (เฉพาะ Suomi-NPP)";
    }

    currentNeighborTotal = neighborTotal;
    renderMap(filteredFeatures, hotspotCounts, totalSpots);
}

                let tambonEl = popupNode.querySelector('.tb-name');
                let amphoeEl = popupNode.querySelector('.ap-name');
                let provinceEl = popupNode.querySelector('.pv-name'); 
                
                let windDirEl = popupNode.querySelector('.wind-dir');
                let windSpeedEl = popupNode.querySelector('.wind-speed');

                let cacheKey = lat + "_" + lon;
                
                if (tambonEl && tambonEl.innerText === 'กำลังค้นหา...') {
                    if (addressCache[cacheKey]) {
                        tambonEl.innerText = addressCache[cacheKey].tambon;
                        amphoeEl.innerText = addressCache[cacheKey].amphoe;
                        provinceEl.innerText = addressCache[cacheKey].province; 
                    } else {
                        fetch(`https://api.longdo.com/map/services/address?lon=${lon}&lat=${lat}&key=${longdoApiKey}`)
                        .then(res => res.json())
                        .then(data => {
                            if(data) {
                                let t = data.subdistrict || "-";
                                let a = data.district || "-";
                                let p = data.province || "-"; 
                                
                                t = t.replace(/^ตำบล/g, '').replace(/^แขวง/g, '').trim();
                                a = a.replace(/^อำเภอ/g, '').replace(/^เขต/g, '').trim();
                                p = p.replace(/^จังหวัด/g, '').trim(); 
                                
                                let finalTambon = t !== "-" ? t : "ไม่ระบุ";
                                let finalAmphoe = a !== "-" ? a : "ไม่ระบุ";
                                let finalProvince = p !== "-" ? p : prov; 
                                
                                tambonEl.innerText = finalTambon;
                                amphoeEl.innerText = finalAmphoe;
                                provinceEl.innerText = finalProvince;
                                
                                addressCache[cacheKey] = { tambon: finalTambon, amphoe: finalAmphoe, province: finalProvince };
                            } else {
                                tambonEl.innerText = "ไม่พบข้อมูล";
                                amphoeEl.innerText = "ไม่พบข้อมูล";
                                provinceEl.innerText = prov;
                            }
                        }).catch(() => {
                            tambonEl.innerText = "ข้อผิดพลาด";
                            amphoeEl.innerText = "ข้อผิดพลาด";
                            provinceEl.innerText = prov;
                        });
                    }
                }

                if (windDirEl && windDirEl.innerText === 'กำลังโหลด...') {
                    let downwindEl = popupNode.querySelector('.downwind-risk');
                    
                    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=wind_speed_10m,wind_direction_10m`)
                    .then(res => res.json())
                    .then(data => {
                        if(data && data.current) {
                            let speed = data.current.wind_speed_10m;
                            let dir = data.current.wind_direction_10m;
                            
                            let arrow = `<span style="display:inline-block; transform: rotate(${dir + 180}deg);">⬆️</span>`;
                            windDirEl.innerHTML = `${arrow} ${dir}°`;
                            windSpeedEl.innerText = `${speed} กม./ชม.`;

                            if (speed > 1) { 
                                let smokeAngle = (dir + 180) % 360;
                                let bearing = smokeAngle > 180 ? smokeAngle - 360 : smokeAngle; 
                                
                                let pt1 = turf.destination([lon, lat], 2.5, bearing, {units: 'kilometers'}).geometry.coordinates;
                                let pt2 = turf.destination([lon, lat], 5, bearing, {units: 'kilometers'}).geometry.coordinates;

                                Promise.all([
                                    fetch(`https://api.longdo.com/map/services/address?lon=${pt1[0]}&lat=${pt1[1]}&key=${longdoApiKey}`).then(r => r.json()),
                                    fetch(`https://api.longdo.com/map/services/address?lon=${pt2[0]}&lat=${pt2[1]}&key=${longdoApiKey}`).then(r => r.json())
                                ]).then(results => {
                                    let riskAreas = [];
                                    
                                    results.forEach(res => {
                                        if (res && res.subdistrict) {
                                            let t = res.subdistrict.replace(/^ตำบล/g, '').replace(/^แขวง/g, '').trim();
                                            let a = res.district ? res.district.replace(/^อำเภอ/g, '').replace(/^เขต/g, '').trim() : '';
                                            let areaName = `${t} ${a}`;
                                            
                                            if (!riskAreas.includes(areaName) && t !== "-") {
                                                riskAreas.push(areaName);
                                            }
                                        }
                                    });

                                    if (riskAreas.length > 0) {
                                        downwindEl.innerHTML = riskAreas.join(' และ ');
                                    } else {
                                        downwindEl.innerHTML = "ไม่พบข้อมูลชุมชนที่ชัดเจน";
                                    }
                                }).catch(() => {
                                    downwindEl.innerHTML = "ระบบวิเคราะห์ที่อยู่ขัดข้อง";
                                });
                                
                            } else {
                                downwindEl.innerHTML = "ลมสงบ ควันอาจสะสมปกคลุมจุดเกิดเหตุ";
                            }
                            
                        } else {
                            windDirEl.innerText = "ไม่พบข้อมูล";
                            windSpeedEl.innerText = "ไม่พบข้อมูล";
                            if (downwindEl) downwindEl.innerHTML = "ไม่สามารถวิเคราะห์ได้";
                        }
                    }).catch(() => {
                        windDirEl.innerText = "ข้อผิดพลาด";
                        windSpeedEl.innerText = "ข้อผิดพลาด";
                        if (downwindEl) downwindEl.innerHTML = "เครือข่ายขัดข้อง";
                    });
                }
            });
        }
    }; 

    const coreGeoJsonLayer = L.geoJSON({ type: "FeatureCollection", features: coreFeatures }, geoJsonOptions);
    hotspotLayer.addLayer(coreGeoJsonLayer);

    const neighborGeoJsonLayer = L.geoJSON({ type: "FeatureCollection", features: neighborFeatures }, geoJsonOptions);
    neighborHotspotLayer.addLayer(neighborGeoJsonLayer);

    currentHotspotTotal = total;
    currentHotspotCounts = counts;
    updateDynamicLegend();
}

function fetchAQMData() {
    const url = 'https://script.google.com/macros/s/AKfycby-YFuRlXJlQSfqMafbUuhjHaPiRYKM1bN0v7Bz0al3rHu5i4biaqaxhM9j71aa1Jtv/exec';
    
    fetch(url)
        .then(res => res.json())
        .then(data => {
            if (data.error) throw new Error(data.error);

            data.forEach(station => {
                const lat = parseFloat(station.lat);
                const lon = parseFloat(station.lon);
                const pm25Value = station.pm25;
                
                let pmNum = parseFloat(pm25Value);
                let textColor = "#94a3b8"; 
                let emoji = "❓";

                if (!isNaN(pmNum)) {
                    if (pmNum <= 15.0) {
                        textColor = "#38bdf8"; 
                        emoji = "😊" + " ดีมาก";
                    } else if (pmNum <= 25.0) {
                        textColor = "#4ade80"; 
                        emoji = "🙂" + " ดี";
                    } else if (pmNum <= 37.5) {
                        textColor = "#facc15"; 
                        emoji = "😐" + " ปานกลาง";
                    } else if (pmNum <= 75.0) {
                        textColor = "#fb923c"; 
                        emoji = "⚠️" + " เริ่มมีผลกระทบต่อสุขภาพ";
                    } else {
                        textColor = "#f87171"; 
                        emoji = "🚨"+ " มีผลกระทบต่อสุขภาพ";
                    }
                }

                let thaiDateTimeDisplay = station.date + " " + station.time;
                try {
                    let dateParts = station.date.split('-');
                    if (dateParts.length === 3) {
                        let d = parseInt(dateParts[2], 10);
                        let mIndex = parseInt(dateParts[1], 10) - 1;
                        let y = parseInt(dateParts[0], 10);

                        if (y < 2500) y += 543; 

                        const fullThaiMonths = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
                        
                        if (mIndex >= 0 && mIndex <= 11) {
                            let timeParts = station.time.split(':');
                            let timeFormatted = station.time;
                            if (timeParts.length >= 2) {
                                timeFormatted = timeParts[0] + ":" + timeParts[1];
                            }
                            thaiDateTimeDisplay = `${d} ${fullThaiMonths[mIndex]} ${y} ${timeFormatted} น.`;
                        }
                    }
                } catch(e) {
                    console.error("เกิดข้อผิดพลาดในการแปลงวันที่", e);
                }

                const triangleSvg = `<svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <polygon points="12,2 22,20 2,20" fill="#9333ea" stroke="#ffffff" stroke-width="2"/>
                </svg>`;

                const customIcon = L.divIcon({
                    html: triangleSvg,
                    className: '', 
                    iconSize: [24, 24],
                    iconAnchor: [12, 12], 
                    popupAnchor: [0, -12] 
                });

                const marker = L.marker([lat, lon], { icon: customIcon });

                let popupHTML = "<div style='font-size: 14px;'>";

                popupHTML += "<div style='background-color:#9333ea; color:white; padding:5px; border-radius:4px; margin-bottom:8px; text-align:center;'><b>สถานีวัดคุณภาพอากาศ (Air4Thai)</b></div>";
                popupHTML += "<b>พิกัด:</b> " + lat.toFixed(5) + "  " + lon.toFixed(5) + "<br>";
                popupHTML += "<b>ตำบล:</b> <span class='aqm-tb-name' style='color:#0284c7; font-weight:bold;'>กำลังค้นหา...</span><br>";
                popupHTML += "<b>อำเภอ:</b> <span class='aqm-ap-name' style='color:#0284c7; font-weight:bold;'>กำลังค้นหา...</span><br>";
                popupHTML += "<b>จังหวัด:</b> " + station.prov_name + "<br>";
                popupHTML += "<b>สถานี:</b> " + station.nameTH + "<br>";
                popupHTML += "<b>เวลา:</b> " + thaiDateTimeDisplay + "<br>";
                popupHTML += "<b>ค่า PM2.5:</b> <span style='font-weight:bold; font-size: 16px; color:" + textColor + "; text-shadow: 0px 0px 1px rgba(0,0,0,0.2);'>" + pm25Value + " µg/m³ " + emoji + "</span><br>";
                
		let googleMapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}`;

                popupHTML += "<br><a href='" + googleMapsUrl + "' target='_blank' style='display:block; text-align:center; background-color:#16a34a; color:white; padding:8px 0; border-radius:6px; text-decoration:none; font-weight:bold;'>📍 เปิดนำทางด้วย Google Maps</a>";
                
                popupHTML += "</div>";

marker.bindPopup(popupHTML);

                marker.on('popupopen', function(e) {
                    let popupNode = e.popup._contentNode;
                    if (!popupNode) return;
                    
                    let tambonEl = popupNode.querySelector('.aqm-tb-name');
                    let amphoeEl = popupNode.querySelector('.aqm-ap-name');
                    let cacheKey = lat + "_" + lon;
                    
                    if (tambonEl && tambonEl.innerText === 'กำลังค้นหา...') {
                        if (addressCache[cacheKey]) {
                            tambonEl.innerText = addressCache[cacheKey].tambon;
                            amphoeEl.innerText = addressCache[cacheKey].amphoe;
                        } else {
                            fetch(`https://api.longdo.com/map/services/address?lon=${lon}&lat=${lat}&key=${longdoApiKey}`)
                            .then(res => res.json())
                            .then(data => {
                                if(data) {
                                    let t = data.subdistrict || "-";
                                    let a = data.district || "-";
                                    
                                    t = t.replace(/^ตำบล/g, '').replace(/^แขวง/g, '').trim();
                                    a = a.replace(/^อำเภอ/g, '').replace(/^เขต/g, '').trim();
                                    
                                    let finalTambon = t !== "-" ? t : "ไม่ระบุ";
                                    let finalAmphoe = a !== "-" ? a : "ไม่ระบุ";
                                    
                                    tambonEl.innerText = finalTambon;
                                    amphoeEl.innerText = finalAmphoe;
                                    
                                    addressCache[cacheKey] = { 
                                        tambon: finalTambon, 
                                        amphoe: finalAmphoe, 
                                        province: station.prov_name 
                                    };
                                } else {
                                    tambonEl.innerText = "ไม่พบข้อมูล";
                                    amphoeEl.innerText = "ไม่พบข้อมูล";
                                }
                            }).catch(() => {
                                tambonEl.innerText = "ข้อผิดพลาด";
                                amphoeEl.innerText = "ข้อผิดพลาด";
                            });
                        }
                    }
                });

                aqmLayer.addLayer(marker);
            });
        })
        .catch(err => {
            console.error("ข้อผิดพลาดในการดึงข้อมูล Air4Thai ผ่าน GAS", err);
            showToast("ไม่สามารถเชื่อมต่อข้อมูลสถานีคุณภาพอากาศได้", "error");
        });
}

function getLandfillColor(area, status) {
    if (status && status.trim() !== "เปิดดำเนินงาน") {
        return "#1f2937"; 
    }

    let areaNum = parseFloat(area);
    if (isNaN(areaNum)) return "#a1a1aa"; 
    if (areaNum <= 15) {
        return "#38bdf8"; 
    } else if (areaNum <= 25.0) {
        return "#4ade80"; 
    } else if (areaNum <= 37.5) {
        return "#facc15"; 
    } else if (areaNum <= 75.0) {
        return "#fb923c"; 
    } else {
        return "#f87171"; 
    }
}

function fetchLandfillData() {
    const gasUrl = 'https://script.google.com/macros/s/AKfycbwWI0NvtyToeNBq5Y0Yu6VCKiJh27JDSDBZTJ0IbQ1mGsErkJfFdzYdkiVAw72GGWKZ/exec'

    fetch(gasUrl)
        .then(res => res.json())
        .then(data => {
            const targetProvinces = ["นครราชสีมา", "ชัยภูมิ", "บุรีรัมย์", "สุรินทร์"]

            data.forEach(row => {
                let prov = row["จังหวัด"] || ""
                let isTarget = targetProvinces.some(p => prov.includes(p))

                if (isTarget) {
                    let lat = parseFloat(row["ละติจูด"])
                    let lon = parseFloat(row["ลองจิจูด"])
                    
                    if (!isNaN(lat) && !isNaN(lon)) {
                        let siteName = row["ชื่อสถานที่"] || "ไม่ระบุชื่อ"
                        let agency = row["ชื่อผู้ดำเนินการ"] || "-"
                        let address = row["ที่ตั้ง"] || "-"
                        let type = row["รูปแบบการกำจัด"] || "-"
                        let area = row["เนื้อที่ (ไร่)"] || "-"
                        let wasteAmount = row["ปริมาณขยะ (ตัน/วัน)"] || "-"
                        let siteStatus = row["สถานะการดำเนินงานในปัจจุบัน"] || "-"
                        let yearStart = row["ปีที่เปิดดำเนินงาน"] || "-"

                        let trashColor = getLandfillColor(area, siteStatus)

                        let wasteNum = parseFloat(wasteAmount)
                        let areaNum = parseFloat(area)
                        let isAtRisk = false
                        let riskReason = ""

                        if (siteStatus.includes("เต็ม") || siteStatus.includes("วิกฤต")) {
                            isAtRisk = true
                            riskReason = "สถานะแจ้งว่าพื้นที่เต็ม"
                        } else if (!isNaN(wasteNum) && !isNaN(areaNum) && areaNum > 0) {
                            let density = wasteNum / areaNum
                            if (density > 1) { 
                                isAtRisk = true
                                riskReason = `ปริมาณขยะมาก (${density.toFixed(2)} ตัน/ไร่/วัน)`
                            }
                        }

                        let bufferWeight = 1.5
                        if (isAtRisk) {
                            trashColor = "#7f1d1d" 
                            bufferWeight = 3
                        }

                        const trashSvg = `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M5 6V20C5 21.1046 5.89543 22 7 22H17C18.1046 22 19 21.1046 19 20V6H5Z" fill="${trashColor}"/>
                            <path d="M9 4V2H15V4H20V6H4V4H9Z" fill="#5D4037"/>
                        </svg>`

                        const trashIcon = L.divIcon({
                            html: trashSvg,
                            className: '',
                            iconSize: [24, 24],
                            iconAnchor: [12, 12],
                            popupAnchor: [0, -12]
                        })

                        let marker = L.marker([lat, lon], { icon: trashIcon })

                        let bufferCircle = L.circle([lat, lon], {
                            color: trashColor,
                            fillColor: trashColor,
                            fillOpacity: 0.1,
                            weight: bufferWeight,
                            dashArray: '5, 5'
                        })
                        bufferCircle.addTo(landfillLayer)

                        let mapNavUrl = `https://www.google.com/maps?q=${lat},${lon}`
                        
                        let popupHTML = `<div style='font-size: 14px;'>
                            <div style='background-color:#5D4037; color:white; padding:5px; border-radius:4px; margin-bottom:8px; text-align:center;'><b>สถานที่กำจัดขยะมูลฝอย (ปี 2568)</b></div>`
                        
                        if (isAtRisk) {
                            popupHTML += `<div style='background-color:#fef2f2; color:#b91c1c; padding:8px; border-left:4px solid #b91c1c; margin-bottom:10px; font-weight:bold;'>⚠️ เฝ้าระวัง: ${riskReason}</div>`
                        }

                        popupHTML += `<b>สถานที่:</b> ${siteName}<br>
                            <b>หน่วยงานดูแล:</b> ${agency}<br>
                            <b>ที่ตั้ง:</b> ${address}<br>
                            <b>รูปแบบการกำจัด:</b> ${type}<br>
                            <b>เนื้อที่:</b> <span style='font-weight:bold; color:${trashColor};'>${area}</span> ไร่<br>
                            <b>ปีเปิด:</b> ${yearStart}<br>
                            <b>สถานะ:</b> ${siteStatus}<br>
                            <b>ปริมาณขยะ:</b> ${wasteAmount} ตัน/วัน<br>
                            <br><a href='${mapNavUrl}' target='_blank' style='display:block; text-align:center; background-color:#16a34a; color:white; padding:8px 0; border-radius:6px; text-decoration:none; font-weight:bold;'>📍 เปิดนำทางด้วย Google Maps</a>
                        </div>`

                        marker.bindPopup(popupHTML)
                        landfillLayer.addLayer(marker)

                        landfillMarkers.push({
                            marker: marker,
                            address: address,
                            name: siteName
                        })

                        if (siteStatus && siteStatus.trim() !== "เปิดดำเนินงาน") {
                            landfillCounts.closed++
                        } else if (isAtRisk) {
                            landfillCounts.risk++
                        } else {
                            if (!isNaN(areaNum)) {
                                if (areaNum <= 15) landfillCounts.size1++
                                else if (areaNum <= 25.0) landfillCounts.size2++
                                else if (areaNum <= 37.5) landfillCounts.size3++
                                else if (areaNum <= 75.0) landfillCounts.size4++
                                else landfillCounts.size5++
                            }
                        }
                    } 
                } 
            }) 

            updateDynamicLegend()
        })
        .catch(err => {
            console.error("เกิดข้อผิดพลาดในการโหลดข้อมูลสถานที่กำจัดขยะ", err)
        })
}

function doSiteSearch() {
    const keyword = document.getElementById('siteSearchInput').value.trim().toLowerCase();
    if (!keyword) {
        showToast("กรุณาระบุชื่อตำบลหรือคำค้นหา", "warning");
        return;
    }

    let found = false;
    for (let item of landfillMarkers) {
        if (item.address.toLowerCase().includes(keyword) || item.name.toLowerCase().includes(keyword)) {
            
            if (!map.hasLayer(landfillLayer)) {
                map.addLayer(landfillLayer);
            }

            map.setView(item.marker.getLatLng(), 14);
            item.marker.openPopup();
            
            showToast("พบสถานที่กำจัดขยะ: " + item.name, "success");

    }
}

async function drawPlumeAndCalculateRisk(lat, lon, dir, speed) {
    if (currentPlumeLayer) {
        incidentLayer.removeLayer(currentPlumeLayer);
        currentPlumeLayer = null;
    }

    const downwindEl = document.getElementById('inc-downwind');

    if (speed > 1) {
        const smokeAngle = (dir + 180) % 360;
        const bearing = smokeAngle > 180 ? smokeAngle - 360 : smokeAngle;
        
        const distance = 5; 
        const spread = 40; 
        
        const leftBearing = bearing - (spread / 2);
        const rightBearing = bearing + (spread / 2);
        
        const leftPt = turf.destination([lon, lat], distance, leftBearing, {units: 'kilometers'}).geometry.coordinates;
        const rightPt = turf.destination([lon, lat], distance, rightBearing, {units: 'kilometers'}).geometry.coordinates;
        
        const coneCoords = [
            [lat, lon],
            [leftPt[1], leftPt[0]],
            [rightPt[1], rightPt[0]]
        ];
        
        currentPlumeLayer = L.polygon(coneCoords, {
            color: '#64748b',
            fillColor: '#94a3b8',
            fillOpacity: 0.4,
            weight: 1,
            dashArray: '4, 4'
        });
        
        if (document.getElementById('togglePlumeBtn').checked) {
            currentPlumeLayer.addTo(incidentLayer);
        }

        const pt1 = turf.destination([lon, lat], 2.5, bearing, {units: 'kilometers'}).geometry.coordinates;
        const pt2 = turf.destination([lon, lat], 5, bearing, {units: 'kilometers'}).geometry.coordinates;

        if (downwindEl) downwindEl.innerHTML = "<span style='color:#64748b;'>กำลังคำนวณพื้นที่ใหม่...</span>";

        try {
            const results = await Promise.all([
                fetch(`https://api.longdo.com/map/services/address?lon=${pt1[0]}&lat=${pt1[1]}&key=${longdoApiKey}`).then(r => r.json()),
                fetch(`https://api.longdo.com/map/services/address?lon=${pt2[0]}&lat=${pt2[1]}&key=${longdoApiKey}`).then(r => r.json())
            ]);

            let riskAreas = [];
            results.forEach(res => {
                if (res && res.subdistrict) {
                    const t = res.subdistrict.replace(/^ตำบล|แขวง/g, '').trim();
                    const a = res.district ? res.district.replace(/^อำเภอ|เขต/g, '').trim() : '';
                    if (!riskAreas.includes(`${t} ${a}`)) riskAreas.push(`${t} ${a}`);
                }
            });
            if(downwindEl) downwindEl.innerHTML = riskAreas.length > 0 ? riskAreas.join(' และ ') : "ไม่พบข้อมูลชุมชน";
        } catch(e) {
            if(downwindEl) downwindEl.innerHTML = "การวิเคราะห์พิกัดขัดข้อง";
        }
    } else {
        if(downwindEl) downwindEl.innerHTML = "ลมสงบ ควันอาจสะสมในพื้นที่เกิดเหตุ";
    }
}

                        let wasteSys = row["ระบบบำบัดน้ำเสีย"] || "-";
                        let wasteCap = row["ความจุระบบน้ำเสีย (ลูกบาศก์เมตร/วัน)"] || "-";
                        let capPower = row["กำลังการผลิตไฟฟ้า (เมกะวัตต์)"] || "-";
                        let airSys = row["ระบบบำบัดอากาศ"] || "-";
                        let dustMeasure = row["มาตรการจัดการฝุ่น"] || "-";

                        const factorySvg = `<div style="font-size: 24px; filter: drop-shadow(0 0 2px rgba(0,0,0,0.5));">🏭</div>`;
                        const factoryIcon = L.divIcon({
                            html: factorySvg,
                            className: '',
                            iconSize: [24, 24],
                            iconAnchor: [12, 12],
                            popupAnchor: [0, -12]
                        });

                        let marker = L.marker([lat, lon], { icon: factoryIcon });
                        
                        let mapNavUrl = "https://www.google.com/maps/dir/?api=1&destination=$" + lat + "," + lon;
                        
                        let popupHTML = `<div style='font-size: 14px; min-width: 250px;'>
                            <div style='background-color:#d97706; color:white; padding:5px; border-radius:4px; margin-bottom:8px; text-align:center;'><b>โรงงานน้ำตาลและไฟฟ้าชีวมวล</b></div>
                            <b>ชื่อโรงงาน:</b> ${fName}<br>
                            <b>ชื่อโรงไฟฟ้า:</b> ${pName}<br>
                            <b>จังหวัด:</b> <span style='color:#0284c7; font-weight:bold;'>${prov}</span><br>
                            <b>กำลังผลิตน้ำตาล:</b> ${capSugar} ตัน/วัน<br>
                            <b>กำลังผลิตไฟฟ้า:</b> ${capPower} เมกะวัตต์<br>
                            <hr style='border: 0; border-top: 1px dashed #ccc; margin: 8px 0;'>
                            <b>ระบบบำบัดน้ำเสีย:</b> ${wasteSys}<br>
                            <b>ความจุระบบน้ำเสีย:</b> ${wasteCap} ลบ.ม./วัน<br>
                            <b>ระบบบำบัดอากาศ:</b> ${airSys}<br>
                            <b>มาตรการจัดการฝุ่น:</b> ${dustMeasure}<br>
                            <br><a href='${mapNavUrl}' target='_blank' style='display:block; text-align:center; background-color:#16a34a; color:white; padding:8px 0; border-radius:6px; text-decoration:none; font-weight:bold;'>📍 เปิดนำทางด้วย Google Maps</a>
                        </div>`;

                        marker.bindPopup(popupHTML);
                        sugarFactoryLayer.addLayer(marker);
                    }
                }
            });
            updateDynamicLegend();
        })
        .catch(err => console.error("เกิดข้อผิดพลาดในการโหลดข้อมูลโรงงานน้ำตาล", err));
}

function fetchNaturalPlacesData() {
    const gasUrl = 'https://script.google.com/macros/s/AKfycbwWI0NvtyToeNBq5Y0Yu6VCKiJh27JDSDBZTJ0IbQ1mGsErkJfFdzYdkiVAw72GGWKZ/exec?sheet=NaturalPlaces';

    fetch(gasUrl)
        .then(res => res.json())
        .then(data => {
            data.forEach(row => {
                let prov = row["จังหวัด"] || "";
                let lat = parseFloat(row["ละติจูด"]);
                let lon = parseFloat(row["ลองจิจูด"]);
                
                if (!isNaN(lat) && !isNaN(lon)) {
                    let name = row["ชื่อแหล่งธรรมชาติ"] || "-";
                    let type = row["ประเภทแหล่ง"] || "-";
                    let tambon = row["ตำบล"] || "-";
                    let amphoe = row["อำเภอ"] || "-";
                    let importance = row["ความสำคัญ"] || "-";
                    let char = row["ลักษณะของพื้นที่"] || "-";

                    const natureSvg = `<div style="font-size: 24px; filter: drop-shadow(0 0 2px rgba(0,0,0,0.5));">🏞️</div>`;
                    const natureIcon = L.divIcon({
                        html: natureSvg,
                        className: '',
                        iconSize: [24, 24],
                        iconAnchor: [12, 12],
                        popupAnchor: [0, -12]
                    });

                    let marker = L.marker([lat, lon], { icon: natureIcon });
                    
                    let mapNavUrl = "https://www.google.com/maps?q=$" + lat + "," + lon;
                    
                    let popupHTML = `<div style='font-size: 14px; min-width: 250px;'>
                        <div style='background-color:#16a34a; color:white; padding:5px; border-radius:4px; margin-bottom:8px; text-align:center;'><b>แหล่งธรรมชาติอันควรอนุรักษ์</b></div>
                        <b>ชื่อสถานที่:</b> <span style='color:#0284c7; font-weight:bold;'>${name}</span><br>
                        <b>ประเภท:</b> ${type}<br>
                        <b>จังหวัด:</b> ${prov}<br>
                        <b>อำเภอ:</b> ${amphoe}<br>
                        <b>ตำบล:</b> ${tambon}<br>
                        <hr style='border: 0; border-top: 1px dashed #ccc; margin: 8px 0;'>
                        <b>ความสำคัญ:</b> ${importance}<br>
                        <b>ลักษณะพื้นที่:</b> ${char}<br>
                        <br><a href='${mapNavUrl}' target='_blank' style='display:block; text-align:center; background-color:#16a34a; color:white; padding:8px 0; border-radius:6px; text-decoration:none; font-weight:bold;'>📍 เปิดนำทางด้วย Google Maps</a>
                    </div>`;

                    marker.bindPopup(popupHTML);
                    naturalLayer.addLayer(marker);
                }
            });
            updateDynamicLegend();
        })
        .catch(err => console.error("เกิดข้อผิดพลาดในการโหลดข้อมูลแหล่งธรรมชาติ", err));
}
